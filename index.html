<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fff8ef">
<title>BIG IF — would you rather?</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🤔</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <h1 id="logo">BIG<span> IF</span></h1>
    <div id="streak" title="daily streak" hidden>🔥<span id="streak-n"></span></div>
  </header>

  <main id="screen"><!-- rendered by app.js --></main>

  <nav id="tabs">
    <button data-tab="play"    class="tab">🎲<span>Play</span></button>
    <button data-tab="history" class="tab">🕰️<span>History</span></button>
    <button data-tab="favs"    class="tab">⭐<span>Faves</span></button>
    <button data-tab="stats"   class="tab">📊<span>Stats</span></button>
    <button data-tab="more"    class="tab">⚙️<span>More</span></button>
  </nav>

  <div id="toast" hidden></div>
</div>
<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
